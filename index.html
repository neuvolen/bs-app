<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ADOM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap');
:root{--k:#0d0d0d;--w:#f4f4f2;--g:#888;--b:#e5e5e3;--bl:#1a5fa8;--s:#fff;--hot:#e74c3c;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Montserrat',sans-serif;background:var(--w);color:var(--k);min-height:100vh;overflow-x:hidden;}

/* ШАПКА */
.hdr{background:var(--k);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-size:20px;font-weight:900;color:#fff;letter-spacing:2px;}
.logo em{color:var(--bl);font-style:normal;}
.sw{display:flex;background:#1c1c1c;border-radius:7px;padding:3px;}
.swb{padding:5px 12px;border-radius:5px;font-size:11px;font-weight:700;border:none;cursor:pointer;background:transparent;color:#555;font-family:'Montserrat',sans-serif;transition:all .2s;}
.swb.on{background:var(--bl);color:#fff;}

/* ЭКРАНЫ */
.scr{display:none;}.scr.on{display:block;}

/* ══ КЛИЕНТ ══ */
/* Категории навигация */
.cat-nav{background:var(--k);padding:0 0 12px;overflow-x:auto;scrollbar-width:none;}
.cat-nav::-webkit-scrollbar{display:none;}
.cat-tabs{display:flex;gap:6px;padding:10px 16px 0;min-width:max-content;}
.ctab{padding:7px 13px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid rgba(255,255,255,.15);cursor:pointer;white-space:nowrap;background:transparent;color:rgba(255,255,255,.5);font-family:'Montserrat',sans-serif;transition:all .2s;}
.ctab.on{background:var(--bl);border-color:var(--bl);color:#fff;}

/* Экран категории */
.cat-screen{display:none;}.cat-screen.on{display:block;}

/* Hero категории */
.cat-hero{background:var(--k);padding:20px 16px;position:relative;overflow:hidden;}
.cat-hero::after{content:attr(data-emoji);position:absolute;right:-5px;bottom:-10px;font-size:90px;opacity:.08;pointer-events:none;}
.cat-tag{display:inline-block;background:var(--bl);color:#fff;font-size:9px;font-weight:800;letter-spacing:1.5px;padding:3px 9px;border-radius:4px;margin-bottom:10px;text-transform:uppercase;}
.cat-title{font-size:22px;font-weight:900;color:#fff;line-height:1.1;margin-bottom:8px;}
.cat-desc{font-size:12px;color:rgba(255,255,255,.5);line-height:1.6;}

/* УТП блок */
.utps{background:#161616;padding:12px 16px;display:flex;flex-direction:column;gap:8px;}
.utp{display:flex;align-items:flex-start;gap:10px;}
.utp-icon{width:28px;height:28px;border-radius:7px;background:rgba(26,95,168,.15);border:1px solid rgba(26,95,168,.25);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.utp-text{font-size:12px;color:rgba(255,255,255,.65);line-height:1.5;}
.utp-text b{color:#fff;font-weight:700;display:block;margin-bottom:1px;}

/* CTA */
.cta-block{background:var(--k);padding:12px 16px 14px;border-top:1px solid #1c1c1c;}
.cta-btn{width:100%;background:var(--bl);color:#fff;border:none;border-radius:12px;padding:14px 16px;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all .15s;line-height:1.2;}
.cta-btn:active{transform:scale(.97);}
.cta-sub{display:block;font-size:10px;font-weight:500;opacity:.7;margin-top:3px;}

/* Секции */
.section{padding:14px 16px 0;}
.sect-t{font-size:10px;font-weight:800;color:var(--g);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;}

/* Проекты */
.proj-cards{display:flex;flex-direction:column;gap:8px;}
.proj-card{background:var(--s);border-radius:14px;border:1px solid var(--b);overflow:hidden;}
.proj-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:#ddd;}
.proj-body{padding:12px;}
.proj-title{font-weight:800;font-size:14px;margin-bottom:6px;}
.proj-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.ptag{background:var(--w);border:1px solid var(--b);padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700;}
.ptag.hl{background:#eff6ff;border-color:#bfdbfe;color:var(--bl);}
.proj-desc{font-size:12px;color:var(--g);line-height:1.5;}

/* Факты */
.facts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.fact{background:var(--s);border:1px solid var(--b);border-radius:13px;padding:13px;}
.fact-n{font-size:26px;font-weight:900;color:var(--k);line-height:1;}
.fact-l{font-size:11px;color:var(--g);margin-top:3px;line-height:1.4;font-weight:600;}

/* Объекты на продажу */
.obj-cards{display:flex;flex-direction:column;gap:8px;}
.obj-card{background:var(--s);border-radius:14px;border:1px solid var(--b);padding:14px;}
.obj-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.obj-name{font-weight:800;font-size:14px;flex:1;padding-right:8px;}
.obj-status{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:800;white-space:nowrap;}
.st-sell{background:#f0fdf4;color:#16a34a;} .st-soon{background:#fefce8;color:#ca8a04;}
.st-avail{background:#eff6ff;color:#2563eb;} .st-plan{background:#f9fafb;color:#6b7280;}
.obj-price{font-size:18px;font-weight:900;color:var(--k);margin-bottom:6px;}
.obj-area{font-size:12px;color:var(--g);margin-bottom:8px;font-weight:600;}
.obj-desc{font-size:11px;color:var(--g);line-height:1.5;}

/* Менеджер */
.mgr{background:var(--k);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;color:#fff;}
.mav{width:42px;height:42px;background:var(--bl);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.mn{font-weight:800;font-size:14px;} .mr{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px;}
.mc{background:rgba(255,255,255,.1);border:none;border-radius:9px;width:40px;height:40px;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* Статус */
.status-card{background:var(--s);border-radius:14px;padding:14px;border:1px solid var(--b);}
.steps{display:flex;position:relative;}
.steps::before{content:'';position:absolute;top:13px;left:14px;right:14px;height:2px;background:var(--b);z-index:0;}
.step{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1;}
.sdot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;border:2px solid var(--b);background:#fff;color:var(--g);margin-bottom:5px;}
.sdot.done{background:var(--k);border-color:var(--k);color:#fff;}
.sdot.now{background:var(--bl);border-color:var(--bl);color:#fff;box-shadow:0 0 0 3px rgba(26,95,168,.2);}
.slbl{font-size:9px;color:var(--g);text-align:center;line-height:1.3;font-weight:600;}
.slbl.act{color:var(--k);font-weight:800;}

/* CTA footer */
.cta-footer{margin:10px 16px 32px;}
.cta-note{font-size:11px;color:var(--g);text-align:center;margin-top:10px;line-height:1.6;}

/* ══ АДМИН ══ */
.met{display:grid;grid-template-columns:repeat(4,1fr);background:var(--k);padding:0 14px 14px;gap:7px;}
.mc2{background:#181818;border-radius:10px;padding:10px 6px;text-align:center;}
.mn2{font-size:24px;font-weight:900;color:#fff;line-height:1;}
.ml{font-size:9px;color:#444;margin-top:2px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
.chips{display:flex;gap:5px;padding:10px 14px 6px;overflow-x:auto;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid var(--b);cursor:pointer;white-space:nowrap;background:#fff;color:var(--k);transition:all .2s;font-family:'Montserrat',sans-serif;}
.chip.on{background:var(--k);color:#fff;border-color:var(--k);}
.leads{padding:4px 14px 80px;display:flex;flex-direction:column;gap:7px;}
.lcard{background:#fff;border-radius:13px;padding:13px;border:1px solid var(--b);cursor:pointer;transition:transform .15s;position:relative;}
.lcard:active{transform:scale(.98);}
.lhead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px;}
.lname{font-weight:800;font-size:15px;}.lmeta{font-size:11px;color:var(--g);margin-top:2px;font-weight:600;}
.badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;flex-shrink:0;}
.b0{background:#eff6ff;color:#2563eb;}.b1{background:#fefce8;color:#ca8a04;}.b2{background:#f0fdf4;color:#16a34a;}
.b3{background:#faf5ff;color:#7c3aed;}.b4{background:#ecfeff;color:#0e7490;}.b5{background:#f0fdf4;color:#15803d;}.b6{background:#f9fafb;color:#6b7280;}
.ltags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.tag{background:var(--w);border:1px solid var(--b);padding:2px 7px;border-radius:5px;font-size:11px;font-weight:600;}
.tag.u{background:#fff1f0;border-color:#fca5a5;color:#dc2626;}
.ldot{position:absolute;top:11px;right:11px;width:7px;height:7px;background:var(--hot);border-radius:50%;}
.lphone{font-size:12px;color:var(--bl);font-weight:700;}
.lcat{font-size:11px;color:var(--g);margin-top:4px;font-weight:600;}

/* Детали */
.det{display:none;position:fixed;inset:0;background:var(--w);z-index:200;overflow-y:auto;}
.det.on{display:block;}
.dhdr{background:var(--k);padding:13px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;}
.back{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;}
.dtl{font-size:18px;font-weight:800;color:#fff;}
.dbody{padding:12px;display:flex;flex-direction:column;gap:9px;padding-bottom:30px;}
.blk{background:#fff;border-radius:13px;padding:13px;border:1px solid var(--b);}
.btl{font-size:10px;font-weight:800;color:var(--g);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--b);font-size:13px;}
.row:last-child{border:none;}.rl{color:var(--g);font-weight:600;}.rv{font-weight:800;text-align:right;}.rv.bl{color:var(--bl);}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.sopt{padding:9px 6px;border-radius:9px;font-size:11px;font-weight:700;border:2px solid transparent;cursor:pointer;text-align:center;transition:all .2s;font-family:'Montserrat',sans-serif;}
.sopt.on{border-color:var(--k)!important;}
.acts{display:flex;flex-direction:column;gap:7px;}
.abtn{padding:13px;border-radius:11px;font-size:14px;font-weight:800;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:transform .15s;font-family:'Montserrat',sans-serif;}
.abtn:active{transform:scale(.97);}
.a1{background:#16a34a;color:#fff;}.a2{background:var(--bl);color:#fff;}.a3{background:var(--k);color:#fff;}
.warm-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--b);align-items:flex-start;}
.warm-item:last-child{border:none;}
.wd{width:38px;height:38px;border-radius:9px;background:var(--w);border:1px solid var(--b);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--g);flex-shrink:0;text-align:center;line-height:1.2;}
.wd.sent{background:#f0fdf4;border-color:#bbf7d0;color:#16a34a;}
.wi{flex:1;}.wt{font-size:13px;font-weight:800;margin-bottom:2px;}.ws{font-size:11px;color:var(--g);line-height:1.4;}
.wsend{background:var(--bl);color:#fff;border:none;border-radius:7px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif;margin-top:6px;display:inline-block;}
.wsent-l{color:#16a34a;font-size:11px;font-weight:700;margin-top:4px;display:block;}
.det-data-raw{background:var(--w);border-radius:9px;padding:10px;font-size:11px;color:var(--g);line-height:1.6;word-break:break-word;}

.empty{text-align:center;padding:40px 20px;}
.ei{font-size:36px;margin-bottom:10px;}.et{font-weight:800;font-size:15px;margin-bottom:5px;}.es{font-size:12px;color:var(--g);}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--k);color:#fff;padding:8px 16px;border-radius:20px;font-size:12px;font-weight:700;opacity:0;transition:all .25s;z-index:999;white-space:nowrap;pointer-events:none;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>

function buildClientUI(){
  var tabs = document.getElementById('catTabs');
  var screens = document.getElementById('catScreens');
  tabs.innerHTML = CAT_KEYS.map(function(k){
    var c = CATS[k];
    return '<button class="ctab'+(k===curCat?' on':'')+'" onclick="switchCat(\''+k+'\')">'+ c.emoji+' '+c.title+'</button>';
  }).join('');
  screens.innerHTML = CAT_KEYS.map(function(k){ return buildCatScreen(k); }).join('');
  // Показываем текущую
  var active = document.getElementById('cs_'+curCat);
  if(active) active.classList.add('on');
}

function switchCat(key){
  curCat = key;
  document.querySelectorAll('.ctab').forEach(function(t,i){ t.classList.toggle('on', CAT_KEYS[i]===key); });
  document.querySelectorAll('.cat-screen').forEach(function(s){ s.classList.remove('on'); });
  var s = document.getElementById('cs_'+key);
  if(s) s.classList.add('on');
  // Скроллим вкладку в видимость
  var tabs = document.querySelectorAll('.ctab');
  var idx = CAT_KEYS.indexOf(key);
  if(tabs[idx]) tabs[idx].scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function buildProjCard(p, key){
  var img = p.img ? '<img class="proj-img" src="'+BASE+p.img+'.jpg" alt="'+p.title+'" onerror="this.style.display=\'none\'">' : '';

  return '<div class="proj-card">'+img+'<div class="proj-body">'+
    '<div class="proj-title">'+p.title+'</div>'+
    '<div class="proj-tags">'+tags+price+'</div>'+
    (p.desc?'<div class="proj-desc">'+p.desc+'</div>':'')+
  '</div></div>';
}

function doSave(){

  if(!curLead._warm)curLead._warm={};
  curLead._warm[idx]=true;
  openDet(curLead.id);
  fetch(GAS+'?action=sendWarm&uid='+encodeURIComponent(curLead.id)+'&step='+idx+'&name='+encodeURIComponent(curLead.name||''))
    .then(function(r){return r.json();})
    .then(function(d){showToast(d&&d.ok?'✅ Отправлено':'⚠️ Ошибка');})
    .catch(function(){showToast('⚠️ Нет связи');});
}

function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(function(){t.classList.remove('on');},2500);}

// Инициализация клиента
buildClientUI();
// Загружаем объекты когда открывается вкладка property
document.getElementById('catTabs').addEventListener('click',function(e){
  if(curCat==='property') loadObjects();
});
</script>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ADOM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   TOKENS
═══════════════════════════════════════ */
:root {
  --k: #080808;
  --w: #f5f3ef;
  --mid: #1a1a1a;
  --g: #7a7a7a;
  --b: #e0deda;
  --s: #ffffff;

  /* Per-category accent — переключается JS */
  --acc: #1a5fa8;
  --acc2: #0d3d6e;
  --acc-text: #ffffff;
  --hero-bg: var(--k);
  --hero-pattern: none;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow-x:hidden; }
body { font-family:'Space Grotesk',sans-serif; background:var(--w); color:var(--k); font-size:14px; }

/* ═══════════════════════════════════════
   HEADER
═══════════════════════════════════════ */
.hdr {
  background:var(--k); padding:10px 16px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:200;
  border-bottom:1px solid #1c1c1c;
}
.logo { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:3px; color:#fff; }
.logo em { color:var(--acc); font-style:normal; }
.sw { display:flex; background:#141414; border-radius:8px; padding:3px; gap:2px; }
.swb { padding:5px 13px; border-radius:6px; font-size:11px; font-weight:700; border:none; cursor:pointer; background:transparent; color:#555; font-family:'Space Grotesk',sans-serif; transition:all .2s; letter-spacing:.3px; }
.swb.on { background:var(--acc); color:#fff; }

/* ═══════════════════════════════════════
   SCREENS
═══════════════════════════════════════ */
.scr { display:none; } .scr.on { display:block; }

/* ═══════════════════════════════════════
   CAT NAV — горизонтальный скролл
═══════════════════════════════════════ */
.cat-nav {
  background:var(--k);
  padding:0 16px 14px;
  overflow-x:auto; scrollbar-width:none;
  border-bottom:1px solid #1c1c1c;
}
.cat-nav::-webkit-scrollbar { display:none; }
.cat-nav-inner { display:flex; gap:6px; padding-top:10px; min-width:max-content; }
.ctab {
  padding:6px 13px; border-radius:20px; font-size:11px; font-weight:700;
  border:1.5px solid rgba(255,255,255,.12); cursor:pointer; white-space:nowrap;
  background:transparent; color:rgba(255,255,255,.4);
  font-family:'Space Grotesk',sans-serif; transition:all .2s; flex-shrink:0;
}
.ctab.on { color:#fff; border-color:var(--acc); background:rgba(255,255,255,.06); }

/* ═══════════════════════════════════════
   CAT SCREENS — каждый уникален
═══════════════════════════════════════ */
.cat-screen { display:none; } .cat-screen.on { display:block; }

/* ────── ОБЩИЕ ────── */
.section { padding:16px 16px 0; }
.sect-label {
  font-family:'DM Mono',monospace; font-size:10px; font-weight:500; letter-spacing:2px;
  text-transform:uppercase; color:var(--g); margin-bottom:12px;
  display:flex; align-items:center; gap:8px;
}
.sect-label::after { content:''; flex:1; height:1px; background:var(--b); }

/* ────── HERO базовый ────── */
.cat-hero {
  position:relative; overflow:hidden; min-height:280px;
  display:flex; flex-direction:column; justify-content:flex-end;
  padding:20px 18px;
  background:var(--hero-bg);
}
.cat-hero-bg {
  position:absolute; inset:0;
  background:var(--hero-pattern);
  opacity:.15; pointer-events:none;
}
.cat-hero-overlay {
  position:absolute; inset:0;
  background:linear-gradient(to bottom, transparent 0%, rgba(8,8,8,.9) 100%);
}
.cat-hero-content { position:relative; z-index:1; }
.cat-eyebrow {
  font-family:'DM Mono',monospace; font-size:10px; letter-spacing:2px;
  text-transform:uppercase; color:var(--acc); margin-bottom:10px;
  display:inline-flex; align-items:center; gap:6px;
}
.cat-eyebrow::before { content:''; width:20px; height:1px; background:var(--acc); display:inline-block; }
.cat-headline {
  font-family:'Bebas Neue',sans-serif; font-size:42px; letter-spacing:1px;
  color:#fff; line-height:.95; margin-bottom:12px;
}
.cat-sub { font-size:13px; color:rgba(255,255,255,.55); line-height:1.6; max-width:320px; }

/* ────── HERO HOUSE — бетон + синий ────── */
#cs_house .cat-hero { min-height:320px; }
#cs_house .cat-hero-bg {
  background: repeating-linear-gradient(0deg, rgba(255,255,255,.03) 0px, rgba(255,255,255,.03) 1px, transparent 1px, transparent 40px),
              repeating-linear-gradient(90deg, rgba(255,255,255,.03) 0px, rgba(255,255,255,.03) 1px, transparent 1px, transparent 40px);
  opacity:1;
}
#cs_house .cat-headline { font-size:52px; }

/* ────── HERO COMMERCIAL — брутализм ────── */
#cs_commercial .cat-hero { background:#0a0a0a; }
#cs_commercial .cat-hero-bg {
  background: repeating-linear-gradient(45deg, rgba(255,255,255,.02) 0, rgba(255,255,255,.02) 2px, transparent 2px, transparent 20px);
  opacity:1;
}
#cs_commercial .cat-headline { font-size:40px; }

/* ────── HERO GLAMPING — органика ────── */
#cs_glamping .cat-hero {
  background: radial-gradient(ellipse at 30% 50%, #1a2e1a 0%, #0d1a0d 60%, #080808 100%);
}
#cs_glamping .cat-eyebrow { color:#7cb87c; }
#cs_glamping .cat-headline { color:#f0f0e8; }

/* ────── HERO MANSARD — тёплый ────── */
#cs_mansard .cat-hero {
  background: linear-gradient(135deg, #1a1208 0%, #2a1e0e 50%, #120c06 100%);
}
#cs_mansard .cat-eyebrow { color:#c4853a; }

/* ────── HERO SCIP — tech ────── */
#cs_scip .cat-hero {
  background: linear-gradient(135deg, #050a14 0%, #0a1628 60%, #020608 100%);
}
#cs_scip .cat-hero-bg {
  background: radial-gradient(circle at 80% 20%, rgba(26,95,168,.3) 0%, transparent 60%);
  opacity:1;
}
#cs_scip .cat-eyebrow { color:#4da6ff; }

/* ────── HERO BLOCK — индустриальный ────── */
#cs_block .cat-hero { background:#0d0d0d; }
#cs_block .cat-hero-bg {
  background: repeating-linear-gradient(90deg, rgba(255,255,255,.025) 0, rgba(255,255,255,.025) 1px, transparent 1px, transparent 60px);
  opacity:1;
}

/* ────── HERO BUNKER — тёмный люкс ────── */
#cs_bunker .cat-hero {
  background: radial-gradient(ellipse at 50% 0%, #1a1a0a 0%, #080808 70%);
}
#cs_bunker .cat-hero-bg {
  background: repeating-conic-gradient(rgba(255,255,255,.015) 0deg, transparent 2deg, transparent 60deg);
  opacity:1;
}
#cs_bunker .cat-eyebrow { color:#b8a040; }
#cs_bunker .cat-headline { color:#f5f0e0; }

/* ────── HERO PROPERTY — editorial ────── */
#cs_property .cat-hero {
  background: linear-gradient(180deg, #0d0d0d 0%, #0a0a0a 100%);
  border-bottom:3px solid var(--acc);
}

/* ────── HERO ELECTRICAL ────── */
#cs_electrical .cat-hero {
  background: linear-gradient(135deg, #0a0d0a 0%, #0d1a0d 100%);
}
#cs_electrical .cat-eyebrow { color:#5ab85a; }

/* ────── HERO PARTNERSHIP ────── */
#cs_partnership .cat-hero { background:#0a0a12; }
#cs_partnership .cat-eyebrow { color:#8080ff; }

/* ────── HERO VACANCY ────── */
#cs_vacancy .cat-hero { background:#0d080d; }
#cs_vacancy .cat-eyebrow { color:#c060c0; }

/* ────── HERO OTHER ────── */
#cs_other .cat-hero { background:#0a0a0a; }

/* ═══════════════════════════════════════
   STATS BAR — горизонтальная полоса цифр
═══════════════════════════════════════ */
.stats-bar {
  background:var(--k); border-bottom:1px solid #1c1c1c;
  display:flex; overflow-x:auto; scrollbar-width:none;
}
.stats-bar::-webkit-scrollbar { display:none; }
.stat-item {
  flex:1; min-width:80px; padding:14px 10px; text-align:center;
  border-right:1px solid #1c1c1c;
  transition:background .2s;
}
.stat-item:last-child { border-right:none; }
.stat-num {
  font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--acc);
  line-height:1; display:block;
}
.stat-label { font-size:9px; color:#555; margin-top:3px; text-transform:uppercase; letter-spacing:.8px; line-height:1.3; }

/* ═══════════════════════════════════════
   CTA PRIMARY
═══════════════════════════════════════ */
.cta-primary {
  padding:14px 16px;
  background:var(--k);
  border-top:1px solid #1c1c1c;
}
.cta-primary-btn {
  width:100%; background:var(--acc); color:#fff;
  border:none; border-radius:0; padding:16px;
  font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px;
  cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center; gap:10px;
  clip-path: polygon(0 0, 100% 0, 97% 100%, 3% 100%);
}
.cta-primary-btn:active { transform:scale(.98); opacity:.9; }
.cta-sub-text {
  text-align:center; font-size:10px; color:#444;
  margin-top:8px; letter-spacing:.5px; text-transform:uppercase;
  font-family:'DM Mono',monospace;
}

/* ═══════════════════════════════════════
   FEATURE CARDS — уникальные под каждую категорию
═══════════════════════════════════════ */

/* Стиль 1: NUMBERED — для house, scip */
.features-numbered { display:flex; flex-direction:column; gap:0; }
.fn-item {
  display:flex; gap:14px; padding:14px 0;
  border-bottom:1px solid var(--b); align-items:flex-start;
}
.fn-item:last-child { border-bottom:none; }
.fn-num {
  font-family:'Bebas Neue',sans-serif; font-size:36px; color:var(--acc);
  line-height:1; min-width:36px; opacity:.6;
}
.fn-body {}
.fn-title { font-weight:700; font-size:14px; margin-bottom:3px; }
.fn-desc { font-size:12px; color:var(--g); line-height:1.55; }

/* Стиль 2: GRID CARDS — для block, commercial */
.features-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.fg-card {
  background:var(--s); border:1px solid var(--b); border-radius:12px;
  padding:14px; position:relative; overflow:hidden;
}
.fg-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:var(--acc);
}
.fg-icon { font-size:22px; margin-bottom:8px; }
.fg-title { font-weight:700; font-size:13px; margin-bottom:3px; }
.fg-desc { font-size:11px; color:var(--g); line-height:1.4; }

/* Стиль 3: TIMELINE — для mansion (до/после), bunker */
.features-timeline { display:flex; flex-direction:column; gap:0; position:relative; padding-left:28px; }
.features-timeline::before { content:''; position:absolute; left:7px; top:8px; bottom:8px; width:2px; background:var(--b); }
.ft-item { position:relative; padding-bottom:20px; }
.ft-item:last-child { padding-bottom:0; }
.ft-dot {
  position:absolute; left:-24px; top:3px;
  width:16px; height:16px; border-radius:50%;
  background:var(--acc); border:2px solid var(--w);
  display:flex; align-items:center; justify-content:center;
  font-size:8px; color:#fff; font-weight:900;
}
.ft-title { font-weight:700; font-size:14px; margin-bottom:3px; }
.ft-desc { font-size:12px; color:var(--g); line-height:1.5; }

/* Стиль 4: BIG ACCENT — для glamping */
.features-accent { display:flex; flex-direction:column; gap:10px; }
.fa-item {
  background:var(--k); border-radius:12px; padding:16px;
  display:flex; align-items:center; gap:14px; color:#fff;
}
.fa-icon { font-size:28px; flex-shrink:0; }
.fa-body {}
.fa-title { font-weight:700; font-size:14px; margin-bottom:3px; color:#fff; }
.fa-desc { font-size:12px; color:rgba(255,255,255,.5); line-height:1.4; }

/* ═══════════════════════════════════════
   TRUST BLOCK — доказательства
═══════════════════════════════════════ */
.trust-block {
  background:var(--k); padding:16px;
  border-top:1px solid #1c1c1c; border-bottom:1px solid #1c1c1c;
  margin-top:16px;
}
.trust-label {
  font-family:'DM Mono',monospace; font-size:9px; letter-spacing:2px;
  text-transform:uppercase; color:#444; margin-bottom:12px;
}
.trust-quote {
  font-family:'Playfair Display',serif; font-style:italic;
  font-size:15px; color:rgba(255,255,255,.7); line-height:1.6;
  border-left:2px solid var(--acc); padding-left:14px;
}
.trust-source { font-size:10px; color:#444; margin-top:8px; letter-spacing:.5px; }

/* ═══════════════════════════════════════
   ПРОЕКТЫ — горизонтальный скролл карточек
═══════════════════════════════════════ */
.proj-scroll {
  display:flex; gap:12px; overflow-x:auto; scrollbar-width:none;
  padding:0 16px;
}
.proj-scroll::-webkit-scrollbar { display:none; }
.proj-card {
  min-width:200px; max-width:220px; border-radius:14px; overflow:hidden;
  background:var(--s); border:1px solid var(--b); flex-shrink:0;
}
.proj-img {
  width:100%; aspect-ratio:4/3; object-fit:cover; display:block;
  background:#ddd;
}
.proj-body { padding:12px; }
.proj-price {
  font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--acc);
  line-height:1; margin-bottom:4px;
}
.proj-title { font-weight:700; font-size:13px; margin-bottom:4px; }
.proj-tags { display:flex; flex-wrap:wrap; gap:4px; }
.ptag { background:var(--w); border:1px solid var(--b); padding:2px 6px; border-radius:4px; font-size:10px; font-weight:600; }
.ptag.hl { background:#eff6ff; border-color:#bfdbfe; color:var(--acc); }

/* ═══════════════════════════════════════
   OBJECTS (property) — magazine cards
═══════════════════════════════════════ */
.obj-magazine { display:flex; flex-direction:column; gap:1px; }
.obj-item {
  background:var(--s); padding:16px;
  display:flex; justify-content:space-between; align-items:flex-start;
  border-bottom:1px solid var(--b); gap:12px;
}
.obj-item:last-child { border-bottom:none; }
.obj-left { flex:1; }
.obj-name { font-weight:700; font-size:15px; margin-bottom:4px; line-height:1.2; }
.obj-area { font-family:'DM Mono',monospace; font-size:11px; color:var(--g); margin-bottom:4px; }
.obj-desc { font-size:12px; color:var(--g); line-height:1.4; }
.obj-right { text-align:right; flex-shrink:0; }
.obj-price { font-family:'Bebas Neue',sans-serif; font-size:24px; color:var(--k); line-height:1; }
.obj-status-badge { display:inline-block; font-size:9px; font-weight:700; padding:3px 8px; border-radius:3px; margin-top:5px; letter-spacing:.5px; text-transform:uppercase; }
.st-sell { background:#f0fdf4; color:#16a34a; }
.st-avail { background:#eff6ff; color:#2563eb; }
.st-soon { background:#fefce8; color:#ca8a04; }
.st-plan { background:#f9fafb; color:#6b7280; }

/* ═══════════════════════════════════════
   MODULE SIZES (block) — таблица модулей
═══════════════════════════════════════ */
.module-table { display:flex; flex-direction:column; gap:8px; }
.module-row {
  background:var(--s); border:1px solid var(--b); border-radius:12px;
  padding:14px; display:flex; align-items:center; gap:14px;
  position:relative; overflow:hidden;
}
.module-row.best::after {
  content:'⭐ ХИТ'; position:absolute; top:8px; right:8px;
  background:var(--acc); color:#fff; font-size:9px; font-weight:800;
  padding:3px 7px; border-radius:4px; letter-spacing:.5px;
}
.module-size {
  font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--acc);
  line-height:1; min-width:70px;
}
.module-body { flex:1; }
.module-title { font-weight:700; font-size:13px; margin-bottom:2px; }
.module-desc { font-size:11px; color:var(--g); line-height:1.4; }
.module-price { font-weight:700; font-size:13px; color:var(--k); text-align:right; white-space:nowrap; }

/* ═══════════════════════════════════════
   PROCESS (bunker) — этапы
═══════════════════════════════════════ */
.process-steps { display:flex; flex-direction:column; gap:0; }
.ps-item {
  display:flex; gap:0; position:relative;
}
.ps-item:not(:last-child)::after {
  content:''; position:absolute; left:19px; top:38px; bottom:-2px; width:2px;
  background:var(--b);
}
.ps-num {
  width:38px; height:38px; border-radius:50%; background:var(--k);
  border:2px solid var(--acc); color:var(--acc); flex-shrink:0;
  font-family:'Bebas Neue',sans-serif; font-size:18px; line-height:1;
  display:flex; align-items:center; justify-content:center;
  position:relative; z-index:1;
}
.ps-body { flex:1; padding:8px 0 20px 14px; }
.ps-title { font-weight:700; font-size:14px; margin-bottom:3px; }
.ps-desc { font-size:12px; color:var(--g); line-height:1.5; }

/* ═══════════════════════════════════════
   COMPARISON (scip) — сравнение
═══════════════════════════════════════ */
.compare-table { background:var(--s); border:1px solid var(--b); border-radius:12px; overflow:hidden; }
.compare-head { display:grid; grid-template-columns:1fr 1fr 1fr; background:var(--k); }
.ch-cell { padding:10px 8px; text-align:center; font-size:10px; font-weight:700; color:#fff; letter-spacing:.5px; }
.ch-cell.acc { color:var(--acc); }
.compare-row { display:grid; grid-template-columns:1fr 1fr 1fr; border-top:1px solid var(--b); }
.cr-cell { padding:9px 8px; text-align:center; font-size:12px; font-weight:600; }
.cr-cell:first-child { color:var(--g); font-size:11px; text-align:left; padding-left:12px; }
.cr-cell.win { color:#16a34a; font-weight:800; }
.cr-cell.lose { color:var(--g); text-decoration:line-through; font-size:11px; }
.compare-row:nth-child(odd) { background:rgba(0,0,0,.02); }

/* ═══════════════════════════════════════
   FAQ
═══════════════════════════════════════ */
.faqs { display:flex; flex-direction:column; gap:0; }
.faq-item { border-bottom:1px solid var(--b); }
.faq-item:last-child { border-bottom:none; }
.faq-q {
  width:100%; padding:14px 0; text-align:left; background:none; border:none;
  font-family:'Space Grotesk',sans-serif; font-size:14px; font-weight:700;
  color:var(--k); cursor:pointer; display:flex; justify-content:space-between; align-items:center; gap:10px;
}
.faq-q::after { content:'+'; font-size:20px; color:var(--acc); flex-shrink:0; transition:transform .2s; }
.faq-item.open .faq-q::after { transform:rotate(45deg); }
.faq-a { font-size:13px; color:var(--g); line-height:1.6; display:none; padding-bottom:14px; }
.faq-item.open .faq-a { display:block; }

/* ═══════════════════════════════════════
   MANAGER
═══════════════════════════════════════ */
.mgr-block {
  background:var(--k); margin:16px 16px 0;
  border-radius:12px; padding:14px 16px;
  display:flex; align-items:center; gap:12px; color:#fff;
  border:1px solid #1c1c1c;
}
.mav { width:44px; height:44px; background:var(--acc); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
.mn { font-weight:700; font-size:14px; } .mr { font-size:11px; color:rgba(255,255,255,.4); margin-top:2px; }
.mc { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12); border-radius:9px; width:40px; height:40px; color:#fff; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }

/* ═══════════════════════════════════════
   CTA FOOTER
═══════════════════════════════════════ */
.cta-footer { margin:14px 16px 32px; }
.cta-footer-note { font-family:'DM Mono',monospace; font-size:10px; color:var(--g); text-align:center; margin-top:10px; letter-spacing:.5px; line-height:1.6; }

/* ═══════════════════════════════════════
   ADMIN CRM
═══════════════════════════════════════ */
.met { display:grid; grid-template-columns:repeat(4,1fr); background:var(--k); padding:0 14px 14px; gap:7px; }
.mc2 { background:#141414; border-radius:10px; padding:10px 6px; text-align:center; }
.mn2 { font-family:'Bebas Neue',sans-serif; font-size:26px; color:var(--acc); line-height:1; }
.ml { font-size:9px; color:#444; margin-top:2px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; }
.chips { display:flex; gap:5px; padding:10px 14px 6px; overflow-x:auto; scrollbar-width:none; }
.chips::-webkit-scrollbar { display:none; }
.chip { padding:5px 12px; border-radius:20px; font-size:11px; font-weight:700; border:1.5px solid var(--b); cursor:pointer; white-space:nowrap; background:#fff; color:var(--k); transition:all .2s; font-family:'Space Grotesk',sans-serif; }

  var acc = CAT_ACCENTS[cat]||'#1a5fa8';

  document.documentElement.style.setProperty('--acc2', acc);

// ══ CLIENT BUILD ══

  document.getElementById('catScreens').innerHTML = CAT_KEYS.map(function(k){ return buildScreen(k); }).join('');

  setAccent(curCat);
}

  curCat=k;

  var s=document.getElementById('cs_'+k);
  if(s) s.classList.add('on');
  setAccent(k);

    .then(function(d){
      var el=document.getElementById('objList');
      if(!el) return;
      if(!d.objects||!d.objects.length){el.innerHTML='<div class="empty"><div class="ei">📭</div><div class="et">Нет объектов</div></div>';return;}
      el.innerHTML=d.objects.map(function(o){
        var stCls=o.status==='Продаётся'?'st-sell':o.status==='В наличии'?'st-avail':o.status&&o.status.indexOf('Скоро')>=0?'st-soon':'st-plan';
        return '<div class="obj-item">'+
          '<div class="obj-left"><div class="obj-name">'+o.name+'</div><div class="obj-area">'+o.area+'</div>'+(o.desc?'<div class="obj-desc">'+o.desc+'</div>':'')+
          '</div><div class="obj-right"><div class="obj-price">'+o.price+'</div><div class="obj-status-badge '+stCls+'">'+o.status+'</div></div>'+
        '</div>';
      }).join('');
    })
    .catch(function(){
      var el=document.getElementById('objList');
      if(el) el.innerHTML=[
        {name:'Таунхаус, Туздыбастау',area:'80 м²',price:'33 млн ₸',status:'Продаётся',desc:'Нал / рассрочка'},
        {name:'Квартира-полуподвал',area:'50 м²',price:'25 млн ₸',status:'Скоро',desc:'Готовится к продаже'},
        {name:'Переносной домик ж/б',area:'25 м²',price:'7 млн ₸',status:'В наличии',desc:'Торг уместен'},
      ].map(function(o){
        var c=o.status==='Продаётся'?'st-sell':o.status==='В наличии'?'st-avail':'st-soon';
        return '<div class="obj-item"><div class="obj-left"><div class="obj-name">'+o.name+'</div><div class="obj-area">'+o.area+'</div><div class="obj-desc">'+o.desc+'</div></div>'+
          '<div class="obj-right"><div class="obj-price">'+o.price+'</div><div class="obj-status-badge '+c+'">'+o.status+'</div></div></div>';
      }).join('');
    });
}

// ══ FAQ toggle ══
function toggleFaq(el){ el.classList.toggle('open'); }

// ══ CTA ══
function doCTA(k, acc){
  if(tg&&tg.sendData) tg.sendData(JSON.stringify({action:'meeting',category:k}));
  else location.href='tel:+77082393572';
}

// ══ ADMIN ══
function loadLeads(){
  fetch(GAS+'?action=getLeads')
    .then(function(r){return r.json();})
    .then(function(d){allLeads=d.leads||[];renderAdmin();})
    .catch(function(){allLeads=demo();renderAdmin();});
  loadObjects();
}

function demo(){
  return [
    {id:'453800951',name:'Rustam Qabden',phone:'+7 702 403 50 36',username:'qabdenr',
     category:'Построить дом',catKey:'house',status:'new',date:'01.06.2026',time:'14:23',hot:true,
     details:{area:'100–150 м²',budget:'50–80 млн ₸',urgency:'Сейчас',city:'Алматы'}},
    {id:'1307494622',name:'Аdом ISM',phone:'+7 701 222 00 63',username:'ADOMISM',
     category:'Блок-комнаты',catKey:'block',status:'working',date:'31.05.2026',time:'09:41',hot:false,
     details:{purpose:'Дача',count:'2–3 штуки',city:'Алматы'}},
  ];
}

function renderAdmin(){
  document.getElementById('mh').textContent=allLeads.filter(function(l){return l.hot;}).length;
  document.getElementById('mw').textContent=allLeads.filter(function(l){return l.status==='working';}).length;
  document.getElementById('mm').textContent=allLeads.filter(function(l){return l.status==='meeting';}).length;
  document.getElementById('md').textContent=allLeads.filter(function(l){return l.status==='done';}).length;
  renderLeads();
}

function renderLeads(){
  var f=curF==='all'?allLeads:curF==='hot'?allLeads.filter(function(l){return l.hot;}):allLeads.filter(function(l){return l.catKey===curF;});
  var el=document.getElementById('leads');
  if(!f.length){el.innerHTML='<div class="empty"><div class="ei">📭</div><div class="et">Нет лидов</div></div>';return;}
  el.innerHTML=f.map(function(l){
    var s=STATUSES.find(function(s){return s.key===l.status;})||STATUSES[0];
    return '<div class="lcard" onclick="openDet(\''+l.id+'\')">'+
      (l.hot?'<div class="ldot"></div>':'')+
      '<div class="lhead"><div><div class="lname">'+l.name+'</div><div class="lmeta">'+l.date+(l.time?' · '+l.time:'')+'</div></div>'+
        '<span class="badge '+s.cls+'">'+s.label+'</span></div>'+
      '<div class="ltags"><span class="tag">'+l.category+'</span>'+
        (l.hot?'<span class="tag u">🔥 Горячий</span>':'')+
        (l.details&&l.details.budget?'<span class="tag">'+l.details.budget+'</span>':'')+
        (l.details&&l.details.city?'<span class="tag">'+l.details.city+'</span>':'')+
      '</div><div class="lphone">📱 '+l.phone+'</div>'+
    '</div>';
  }).join('');
}

function filt(f,el){curF=f;document.querySelectorAll('.chip').forEach(function(c){c.classList.remove('on');});el.classList.add('on');renderLeads();}

function openDet(id){
  curLead=allLeads.find(function(l){return l.id===id;});
  if(!curLead) return;
  document.getElementById('dttl').textContent=curLead.name;
  var sOpts=STATUSES.map(function(st){return '<div class="sopt'+(st.key===curLead.status?' on':'')+'" style="background:'+st.bg+';color:'+st.color+'" onclick="pickS(\''+st.key+'\',this)">'+st.label+'</div>';}).join('');
  var detStr=curLead.details?Object.keys(curLead.details).map(function(k){return k+': '+curLead.details[k];}).join('\n'):'';
  var warmHtml=WARMUP.map(function(w,i){
    var sent=curLead._warm&&curLead._warm[i];
    return '<div class="warm-item"><div class="wd'+(sent?' sent':'')+'"><span>'+w.icon+'</span><span style="font-size:9px">'+w.day+'</span></div>'+
      '<div class="wi"><div class="wt">'+w.title+'</div><div class="ws">'+w.desc+'</div>'+
        (!sent?'<button class="wsend" onclick="sendWarm('+i+')">Отправить</button>':'<span class="wsent-l">✓ Отправлено</span>')+
      '</div></div>';
  }).join('');
  document.getElementById('dbdy').innerHTML=
    '<div class="blk"><div class="btl">Контакты</div>'+
      '<div class="row"><span class="rl">Имя</span><span class="rv">'+curLead.name+'</span></div>'+
      '<div class="row"><span class="rl">Телефон</span><span class="rv bl">'+curLead.phone+'</span></div>'+
      (curLead.username?'<div class="row"><span class="rl">Telegram</span><span class="rv bl">@'+curLead.username+'</span></div>':'')+
      '<div class="row"><span class="rl">Заявка</span><span class="rv">'+(curLead.date||'')+(curLead.time?' в '+curLead.time:'')+'</span></div>'+
    '</div>'+
    '<div class="blk"><div class="btl">Запрос · '+curLead.category+'</div>'+(detStr?'<div class="det-raw">'+detStr.replace(/\n/g,'<br>')+'</div>':'<div style="font-size:12px;color:var(--g)">Нет деталей</div>')+'</div>'+
    '<div class="blk"><div class="btl">Статус</div><div class="sgrid">'+sOpts+'</div></div>'+
    '<div class="blk"><div class="btl">Прогрев</div>'+warmHtml+'</div>'+
    '<div class="blk"><div class="btl">Действия</div><div class="acts">'+
      '<button class="abtn a1" onclick="doCall()">📞 '+curLead.phone+'</button>'+
      (curLead.username?'<button class="abtn a2" onclick="doMsg()">✉️ @'+curLead.username+'</button>':'')+
      '<button class="abtn a3" onclick="doSave()">💾 Сохранить статус</button>'+
    '</div></div>';
  document.getElementById('det').classList.add('on');
  if(tg) tg.BackButton.show();
}

function closeDet(){document.getElementById('det').classList.remove('on');if(tg)tg.BackButton.hide();}
function pickS(k,el){document.querySelectorAll('.sopt').forEach(function(o){o.classList.remove('on');});el.classList.add('on');if(curLead)curLead.status=k;}
function doCall(){if(curLead)location.href='tel:'+curLead.phone.replace(/\s/g,'');}
function doMsg(){if(curLead&&curLead.username)window.open('https://t.me/'+curLead.username,'_blank');}
function doSave(){
  var i=allLeads.findIndex(function(l){return l.id===curLead.id;});
  if(i>=0)allLeads[i]=curLead;
  fetch(GAS+'?action=updateStatus&uid='+encodeURIComponent(curLead.id)+'&status='+encodeURIComponent(curLead.status)).catch(function(){});
  renderAdmin();closeDet();showToast('✅ Статус сохранён');
}
function sendWarm(idx){
  if(!curLead._warm)curLead._warm={};curLead._warm[idx]=true;openDet(curLead.id);
  fetch(GAS+'?action=sendWarm&uid='+encodeURIComponent(curLead.id)+'&step='+idx+'&name='+encodeURIComponent(curLead.name||''))
    .then(function(r){return r.json();}).then(function(d){showToast(d&&d.ok?'✅ Отправлено':'⚠️ Ошибка');}).catch(function(){showToast('⚠️ Нет связи');});
}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(function(){t.classList.remove('on');},2500);}

// Init objects when property tab opens
document.addEventListener('click',function(e){
  if(curCat==='property'&&e.target.dataset&&e.target.dataset.cat==='property') loadObjects();
});
if(curCat==='property') setTimeout(loadObjects, 500);
</script>
